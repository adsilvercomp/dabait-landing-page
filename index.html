  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --pink: #FF628C;
      --black: #000000;
      --white: #ffffff;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--black);
      color: var(--white);
      font-family: 'Albert Sans', sans-serif;
      height: 100dvh;
      overflow: scroll;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    header {
      padding: 24px 32px;
    }

    .logo {
      font-size: 40px;
      font-weight: 720;
      color: var(--pink);
      /* letter-spacing: -0.5px; */
    }

    /* MAIN */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      position: relative;
    }

    /* HEADLINE */
    .headline {
      font-size: 26px;
      font-weight: 700;
      color: var(--white);
      text-align: center;
      margin-bottom: 16px;
      letter-spacing: -0.5px;
      line-height: 1.15;
    }

    /* SUBHEADLINE */
    .subheadline {
      font-size: 20px;
      font-weight: 600;
      color: var(--white);
      text-align: center;
      margin-bottom: 40px;
      opacity: 0.9;
    }

    .cta-button {
      display: block;
      width: 280px;
      cursor: pointer !important;
      text-decoration: none;
      animation: pulse 2s ease-in-out infinite;
      background-color: var(--pink);
      color: var(--white);
      font-family: 'Albert Sans', sans-serif;
      font-size: 16px;
      font-weight: 700;
      text-align: center;
      padding: 16px 24px;
      border-radius: 6px;
      letter-spacing: 0.5px;
    }

    .cta-button:hover {
      transform: scale(1.04);
      filter: brightness(1.05);
    }

    .cta-button:active {
      transform: scale(0.97);
      filter: brightness(0.95);
    }

    .cta-button img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* FOOTER */
    footer {
      width: 100%;
      background-color: var(--black);
      display: flex;
      justify-content: flex-end;
      padding-right: 24px;
    }

    /* AVATAR */
    .avatar-container {
      width: 260px;
      pointer-events: none;
      user-select: none;
      flex-shrink: 0;
    }

    .avatar-container img {
      width: 100%;
      height: auto;
      display: block;
    }

    @keyframes pulse {
      0% { transform: scale(1); filter: brightness(1); }
      50% { transform: scale(1.06); filter: brightness(1.08); }
      100% { transform: scale(1); filter: brightness(1); }
    }


    /* MOBILE */
    @media (max-width: 600px) {
      header {
        text-align: center;
        padding: 20px 16px;
      }

      main {
        padding: 20px 16px 40px;
        justify-content: flex-start;
        /* padding-top: 60px; */
      }

      .headline {
        font-size: 24px;
      }

      .subheadline {
        font-size: 16px;
      }

      .cta-button {
        width: 240px;
        font-size: 14px;
      }

      .avatar-container {
        width: 212px;
        pointer-events: none;
        user-select: none;
        flex-shrink: 0;
      }

      footer {
        justify-content: center;
        padding-right: 0;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1 class="logo" aria-label="Da'bait">Da<span style="font-style: italic; margin-left: -4px; letter-spacing: 7px">'</span>bait</h1>
    
  </header>

  <main>
    <h2 class="headline">The Chaos Club</h2>
    <div style="width: 100%; max-width: 340px; margin: 0 auto 32px auto; border-radius: 12px; overflow: hidden;">
    <div style="position: relative; padding-bottom: 177.78%; height: 0;">
      <iframe
        src="https://www.youtube.com/embed/BMut1cPCugc"
        style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;"
        allow="autoplay; encrypted-media"
        allowfullscreen>
      </iframe>
    </div>
    </div>

    <a class="cta-button" id="cta-link" href="#">Are You Chaotic Enough?</a>
  </main>

  <footer>
 
  </footer>

  <script>
    // UTM passthrough — reads platform and title from URL and appends to Tally form
    const baseSurveyUrl = 'https://tally.so/r/ODPjZp';

    function buildSurveyUrl() {
      const params = new URLSearchParams(window.location.search);
      const platform = params.get('platform') || '';
      const title = params.get('title') || '';

      const tallyParams = new URLSearchParams();
      if (platform) tallyParams.set('platform', platform);
      if (title) tallyParams.set('title', title);

      const query = tallyParams.toString();
      return query ? baseSurveyUrl + '?' + query : baseSurveyUrl;
    }

    document.getElementById('cta-link').href = buildSurveyUrl();

    if (new URLSearchParams(window.location.search).get('form_complete') === 'true') {
      window.history.replaceState({}, '', window.location.pathname);

      // Wait for gtag to be ready
      function fireCompletionEvent() {
        if (typeof gtag === 'function') {
          gtag('event', 'tally_form_completed');
        } else {
          setTimeout(fireCompletionEvent, 100);
        }
      }
      fireCompletionEvent();

      // Show thank you message
      const cta = document.getElementById('cta-link');
      cta.style.pointerEvents = 'none';
      cta.style.opacity = '0.5';

      const msg = document.createElement('p');
      msg.textContent = "You're on the list! We'll be in touch 🎉";
      msg.style.color = '#FF628C';
      msg.style.fontWeight = '600';
      msg.style.marginTop = '16px';
      cta.parentNode.insertBefore(msg, cta.nextSibling);
    }
  </script>

  <script>
  document.getElementById('cta-link').addEventListener('click', function(e) {
    // 1. Prevent the immediate jump to tally.so
    e.preventDefault();
    var url = this.getAttribute('href');

    // 2. Send the event to Google Analytics
    gtag('event', 'get_early_access_click', {
      'event_callback': function() {
        // 3. Once GA confirms receipt, go to the link
        window.location.href = url;
      }
    });

    // Fallback: If GA takes more than 1 second, go anyway
    setTimeout(function() {
      window.location.href = url;
    }, 1000);
  });
</script>

</body>
